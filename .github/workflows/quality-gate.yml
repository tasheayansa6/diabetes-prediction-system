name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Flask Flask-SQLAlchemy Flask-Migrate python-dotenv pytest

      - name: Syntax check
        run: python -m compileall backend

      - name: Migration integrity check
        run: python tools/check_migrations.py

      - name: Security config tests
        run: pytest -q tests/quality

