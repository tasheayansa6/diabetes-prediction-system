services:
  - type: web
    name: diabetes-prediction-system
    env: python
    plan: free
    buildCommand: pip install -r requirements_render.txt
    startCommand: gunicorn run:app --workers 1 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: FLASK_ENV
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: DATABASE_URL
        value: sqlite:///instance/diabetes.db
      - key: SECRET_KEY
        generateValue: true

