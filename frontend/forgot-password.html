<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Diabetes Prediction System</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    <script src="static/vendor/js/tailwind.min.js"></script>
    <link href="static/vendor/css/bootstrap-icons.css" rel="stylesheet">
    <link href="static/css/app.css" rel="stylesheet">
</head>
<body class="auth-page">
  <div style="width:100%;max-width:440px;position:relative;z-index:1;">
    <div class="auth-card">

      <!-- Brand -->
      <div class="flex items-center justify-center gap-2 mb-6">
        <i class="bi bi-heart-pulse-fill text-blue-500 text-xl"></i>
        <span class="font-bold text-gray-800 text-sm">Diabetes Prediction System</span>
      </div>

      <!-- Icon + Title -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-3" style="background:linear-gradient(135deg,#3b82f6,#2563eb);">
          <i class="bi bi-key-fill text-white text-2xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900">Forgot Password?</h2>
        <p class="text-gray-500 text-sm mt-1">Enter your email and we'll send you a reset link.</p>
      </div>

      <div id="alertContainer" class="mb-4"></div>

      <form id="forgotPasswordForm" onsubmit="handleForgotPassword(event)" class="space-y-4">
        <div>
          <label class="block mb-1 text-xs font-semibold text-gray-600 uppercase tracking-wide">Email Address</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" name="email" placeholder="Enter your registered email" required
              class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-400 focus:border-blue-400 block w-full pl-9 pr-3 py-2.5 outline-none transition">
          </div>
        </div>
        <button type="submit"
          class="w-full text-white font-semibold rounded-xl text-sm px-5 py-3 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg"
          style="background:linear-gradient(135deg,#3b82f6,#2563eb);">
          <i class="bi bi-send"></i> Send Reset Link
        </button>
        <div class="text-center">
          <a href="/login" class="text-blue-600 text-sm hover:underline font-medium">
            <i class="bi bi-arrow-left"></i> Back to Login
          </a>
        </div>
      </form>
    </div>
  </div>
  <script src="static/js/forgot-password.js"></script>
</body>
</html>
