<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Diabetes Prediction System</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    <link href="static/vendor/css/bootstrap-icons.css" rel="stylesheet">
    <script src="static/vendor/js/tailwind.min.js"></script>
    <link rel="stylesheet" href="static/css/app.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #020818 0%, #0a1628 30%, #0d2257 60%, #1a3a8a 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; font-family: 'Inter', sans-serif;
        }
        .login-wrapper {
            display: flex; width: 100%; max-width: 900px;
            min-height: 560px; border-radius: 24px;
            overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        /* Left panel */
        .left-panel { flex: 1; position: relative; display: flex; flex-direction: column; justify-content: flex-end; min-width: 0; }
        .left-panel img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; }
        .left-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(2,8,24,0.2) 0%, rgba(10,22,40,0.5) 50%, rgba(13,34,87,0.93) 100%);
        }
        .left-content { position: relative; z-index: 2; padding: 2.5rem; }
        .left-content .brand { display: flex; align-items: center; gap: 0.6rem; font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 2.5rem; }
        .left-content .brand i { font-size: 1.4rem; color: #60a5fa; }
        .left-content h2 { font-size: 1.8rem; font-weight: 800; color: #fff; line-height: 1.25; margin-bottom: 0.6rem; }
        .left-content p { color: #bfdbfe; font-size: 0.875rem; line-height: 1.6; margin-bottom: 1.5rem; }
        .stat-row { display: flex; gap: 1.5rem; }
        .stat-box { text-align: center; }
        .stat-box .num { font-size: 1.5rem; font-weight: 800; color: #60a5fa; }
        .stat-box .lbl { font-size: 0.7rem; color: #93c5fd; text-transform: uppercase; letter-spacing: 0.05em; }
        /* Right panel */
        .right-panel {
            width: 420px; min-width: 420px; background: #fff;
            display: flex; flex-direction: column; justify-content: center;
            padding: 2.75rem 2.5rem; overflow-y: auto;
        }
        @media(max-width:800px){ .left-panel{display:none;} .right-panel{width:100%;min-width:0;border-radius:24px;} .login-wrapper{border-radius:24px;} }
    </style>
</head>
<body>
  <div class="login-wrapper">

    <!-- Left -->
    <div class="left-panel">
      <img src="static/img/doctor-sign.jpg" alt="Diabetes Prediction">
      <div class="left-overlay"></div>
      <div class="left-content">
        <div class="brand"><i class="bi bi-heart-pulse-fill"></i> Diabetes Prediction System</div>
        <h2>Welcome<br>Back </h2>
        <p>Sign in to access your personalized health dashboard and AI-powered diabetes insights.</p>
        <div class="stat-row">
          <div class="stat-box"><div class="num" id="modelAccuracy">87.7%</div><div class="lbl">Accuracy</div></div>
          <div class="stat-box"><div class="num">10K+</div><div class="lbl">Patients</div></div>
          <div class="stat-box"><div class="num">24/7</div><div class="lbl">Available</div></div>
        </div>
      </div>
    </div>

    <!-- Right -->
    <div class="right-panel">
      <div class="mb-8">
        <div class="flex items-center gap-2 mb-1">
          <div class="bg-blue-100 rounded-xl p-2">
            <i class="bi bi-box-arrow-in-right text-2xl text-blue-600"></i>
          </div>
          <div>
            <h1 class="text-2xl font-bold text-gray-900">Sign In</h1>
            <p class="text-xs text-gray-400">Enter your credentials to continue</p>
          </div>
        </div>
      </div>

      <div id="alertBox" class="mb-4"></div>

      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4" autocomplete="off">

        <div>
          <label class="block mb-1 text-xs font-semibold text-gray-600 uppercase tracking-wide">Email Address</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="bi bi-envelope"></i></span>
            <input type="email" id="email" placeholder="your@email.com" required autocomplete="username"
              class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-400 focus:border-blue-400 block w-full pl-9 pr-3 py-2.5 outline-none transition">
          </div>
        </div>

        <div>
          <label class="block mb-1 text-xs font-semibold text-gray-600 uppercase tracking-wide">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password"
              class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-blue-400 focus:border-blue-400 block w-full pl-9 pr-3 py-2.5 outline-none transition">
          </div>
        </div>

        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 text-sm text-gray-500 cursor-pointer">
            <input type="checkbox" id="remember" class="w-4 h-4 text-blue-600 rounded"> Remember me
          </label>
          <a href="/forgot-password.html" class="text-sm text-blue-600 font-semibold hover:underline">
            <i class="bi bi-key"></i> Forgot Password?
          </a>
        </div>

        <button type="submit"
          class="w-full text-white font-semibold rounded-xl text-sm px-5 py-3 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg"
          style="background: linear-gradient(135deg, #2563eb, #1d4ed8);">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>

      </form>

      <div class="text-center mt-6 space-y-2">
        <p class="text-sm text-gray-500">Don't have an account?
          <a href="/register" class="text-blue-600 font-semibold hover:underline">Register here</a>
        </p>
        <a href="/" class="text-xs text-gray-400 hover:text-gray-500">
          <i class="bi bi-arrow-left"></i> Back to Home
        </a>
      </div>
    </div>

  </div>
  <script src="static/js/login.js"></script>
  <script>
    fetch('/api/model/info').then(r=>r.json()).then(d=>{
      const el=document.getElementById('modelAccuracy');
      if(el&&d.accuracy) el.textContent=Math.round(d.accuracy*100*10)/10+'%';
    }).catch(()=>{});
  </script>
</body>
</html>
