<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Diabetes Prediction System</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    <script src="static/vendor/js/tailwind.min.js"></script>
    <link href="static/vendor/css/bootstrap-icons.css" rel="stylesheet">
    <link href="static/css/app.css" rel="stylesheet">
</head>
<body class="auth-page">
  <div style="width:100%;max-width:440px;position:relative;z-index:1;">
    <div class="auth-card">

      <!-- Brand -->
      <div class="flex items-center justify-center gap-2 mb-6">
        <i class="bi bi-heart-pulse-fill text-blue-500 text-xl"></i>
        <span class="font-bold text-gray-800 text-sm">Diabetes Prediction System</span>
      </div>

      <!-- Icon + Title -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-3" style="background:linear-gradient(135deg,#6366f1,#4f46e5);">
          <i class="bi bi-shield-lock-fill text-white text-2xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900">Reset Password</h2>
        <p class="text-gray-500 text-sm mt-1">Enter your new password below.</p>
      </div>

      <div id="alertContainer" class="mb-4"></div>

      <form id="resetPasswordForm" onsubmit="handleResetPassword(event)" class="space-y-4">

        <div>
          <label class="block mb-1 text-xs font-semibold text-gray-600 uppercase tracking-wide">New Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="bi bi-lock"></i></span>
            <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required minlength="8"
              class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 block w-full pl-9 pr-10 py-2.5 outline-none transition">
            <button type="button" onclick="togglePassword('newPassword')"
              class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
              <i class="bi bi-eye" id="newPasswordIcon"></i>
            </button>
          </div>
          <p class="text-gray-400 text-xs mt-1">At least 8 characters with uppercase, lowercase and number</p>
        </div>

        <div>
          <label class="block mb-1 text-xs font-semibold text-gray-600 uppercase tracking-wide">Confirm Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required minlength="8"
              class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 block w-full pl-9 pr-10 py-2.5 outline-none transition">
            <button type="button" onclick="togglePassword('confirmPassword')"
              class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600">
              <i class="bi bi-eye" id="confirmPasswordIcon"></i>
            </button>
          </div>
        </div>

        <!-- Strength bar -->
        <div>
          <div class="h-2 bg-gray-100 rounded-full overflow-hidden" id="passwordStrength">
            <div class="h-2 rounded-full transition-all duration-300" id="strengthBar" style="width:0%"></div>
          </div>
          <p class="text-xs mt-1 font-medium" id="strengthText"></p>
        </div>

        <button type="submit"
          class="w-full text-white font-semibold rounded-xl text-sm px-5 py-3 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-lg"
          style="background:linear-gradient(135deg,#6366f1,#4f46e5);">
          <i class="bi bi-check-circle"></i> Reset Password
        </button>

        <div class="text-center">
          <a href="/login" class="text-blue-600 text-sm hover:underline font-medium">
            <i class="bi bi-arrow-left"></i> Back to Login
          </a>
        </div>
      </form>
    </div>
  </div>
  <script src="static/js/reset-password.js"></script>
</body>
</html>
