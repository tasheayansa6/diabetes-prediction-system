<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient List - Diabetes Prediction System</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
    <script src="/static/vendor/js/tailwind.min.js"></script>
    <link href="/static/vendor/css/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
<div class="app-layout">
  <nav class="topbar">
    <a href="/" class="topbar-brand"><i class="bi bi-heart-pulse-fill"></i> Diabetes Prediction System</a>
    <div class="topbar-right">
      <span class="topbar-user"><i class="bi bi-person-circle"></i> <span id="navUserName">Doctor</span></span>
      <button onclick="handleLogout()" class="topbar-btn"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </nav>
  <div class="app-body">
    <aside class="sidebar">
      <div class="sidebar-profile">
        <div class="sidebar-avatar"><i class="bi bi-person-badge"></i></div>
        <div class="sidebar-name" id="sidebarDoctorName">Doctor</div>
        <div class="sidebar-role" id="sidebarDoctorSpec">Doctor Portal</div>
      </div>
      <nav>
        <a class="nav-item" href="/templates/doctor/dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a class="nav-item" href="/templates/doctor/appointments.html"><i class="bi bi-calendar-check"></i> Appointments</a>
        <a class="nav-item active" href="/templates/doctor/patient_list.html"><i class="bi bi-people"></i> Patient List</a>
        <a class="nav-item" href="/templates/doctor/diagnosis.html"><i class="bi bi-clipboard-pulse"></i> Diagnosis</a>
        <a class="nav-item" href="/templates/doctor/prescribe_medication.html"><i class="bi bi-capsule"></i> Prescribe</a>
        <a class="nav-item" href="/templates/doctor/lab_requests.html"><i class="bi bi-clipboard2-pulse"></i> Lab Requests</a>
      </nav>
    </aside>
    <main class="main">
      <h2 class="page-title"><i class="bi bi-people"></i> Patient List</h2>
      <div class="flex gap-3 mb-4">
        <input type="text" id="searchInput" class="form-input" placeholder="Search by name, email or ID..." style="max-width:320px;">
        <button class="btn btn-primary" onclick="loadPatients()"><i class="bi bi-search"></i> Search</button>
      </div>
      <div id="loadingSpinner" class="text-center py-4 hidden"><div class="inline-block w-6 h-6 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>
      <div id="errorAlert" class="alert alert-danger hidden"></div>
      <div class="card">
        <div class="table-responsive">
          <table class="table">
            <thead><tr><th>Patient ID</th><th>Name</th><th>Email</th><th>Registered</th><th>Actions</th></tr></thead>
            <tbody id="patientTableBody"><tr><td colspan="5" class="text-center text-gray-400">Loading patients...</td></tr></tbody>
          </table>
        </div>
        <div id="paginationInfo" class="text-gray-500 text-sm mt-2"></div>
      </div>
      <div class="text-center mt-4">
        <a href="/templates/doctor/dashboard.html" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
      </div>
    </main>
  </div>
</div>
<footer class="footer"><p><i class="bi bi-heart-pulse-fill"></i> Diabetes Prediction System &copy; 2026</p></footer>
<script src="/static/js/auth.js"></script>
<script src="/static/js/doctor-patient-list.js"></script>
</body>
</html>
