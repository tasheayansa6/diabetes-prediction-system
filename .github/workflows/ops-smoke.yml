name: Ops Smoke

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backup-restore-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backup/restore smoke
        run: python tools/backup_restore_smoke.py

