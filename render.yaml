services:
  - type: web
    name: diabetes-prediction-system
    env: python
    plan: free
    buildCommand: pip install -r requirements_production.txt
    startCommand: python seed_postgres.py; gunicorn run:app --workers 2 --worker-class geventwebsocket.gunicorn.workers.GeventWebSocketWorker --timeout 120 --bind 0.0.0.0:$PORT --max-requests 1000 --max-requests-jitter 100
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: FLASK_ENV
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_BOOTSTRAP_EMAIL
        value: admin@system.com
      - key: ADMIN_BOOTSTRAP_USERNAME
        value: admin
      - key: CHAPA_CALLBACK_URL
        value: https://diabetes-prediction-system-n7ik.onrender.com/api/payments/chapa/webhook
      - key: CHAPA_RETURN_URL
        value: https://diabetes-prediction-system-n7ik.onrender.com/templates/payment/payment_success.html
      - key: MAIL_SUPPRESS_SEND
        value: "False"
      - key: MAIL_SERVER
        value: "smtp.gmail.com"
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USE_TLS
        value: "True"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: CHAPA_SECRET_KEY
        sync: false
      - key: CHAPA_PUBLIC_KEY
        sync: false
      - key: CHAPA_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /health
